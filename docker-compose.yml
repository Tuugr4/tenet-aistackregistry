services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aibom
      POSTGRES_PASSWORD: aibom
      POSTGRES_DB: aibom
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibom"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://aibom:aibom@db:5432/aibom
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
